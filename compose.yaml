services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://capital_call:capital_call@db:5432/capital_call
      - JWT_SECRET=local-dev-secret
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - APP_ENV=development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: capital_call
      POSTGRES_PASSWORD: capital_call
      POSTGRES_DB: capital_call
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capital_call -d capital_call"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
